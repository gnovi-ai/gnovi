# Ephemeral services for CI integration tests — no volumes
name: gnovi-test

services:
  postgres-test:
    image: pgvector/pgvector:0.8.2-pg18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gnovi_test
      POSTGRES_PASSWORD: gnovi_test
      POSTGRES_DB: gnovi_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnovi_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  falkordb-test:
    image: falkordb/falkordb:v4.18.0
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:8-alpine
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
