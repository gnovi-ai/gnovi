name: CI - Python

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "libs/**"
      - "experiments/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "libs/**"
      - "experiments/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  ci-python:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18
        env:
          POSTGRES_USER: gnovi_test
          POSTGRES_PASSWORD: gnovi_test
          POSTGRES_DB: gnovi_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U gnovi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      falkordb:
        image: falkordb/falkordb:v4.18.0
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6382:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest --cov --cov-report=xml

      - name: REUSE license check
        uses: fsfe/reuse-action@v5
