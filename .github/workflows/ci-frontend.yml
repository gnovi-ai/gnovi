name: CI - Frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
  pull_request:

jobs:
  ci-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'apps/web/**'
              - 'packages/**'
              - 'docs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

      - name: Install pnpm
        if: steps.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.changes.outputs.frontend == 'true'
        run: pnpm turbo lint

      - name: Type check
        if: steps.changes.outputs.frontend == 'true'
        run: pnpm turbo typecheck

      - name: Test
        if: steps.changes.outputs.frontend == 'true'
        run: pnpm turbo test

      - name: Build
        if: steps.changes.outputs.frontend == 'true'
        run: pnpm turbo build
