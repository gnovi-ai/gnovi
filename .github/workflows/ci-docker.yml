name: CI - Docker

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - { name: api, dockerfile: apps/api/Dockerfile }
          - { name: worker, dockerfile: apps/worker/Dockerfile }
          - { name: web, dockerfile: apps/web/Dockerfile }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          target: prod
          push: true
          tags: |
            ghcr.io/gnovi-ai/gnovi-${{ matrix.service.name }}:${{ github.sha }}
            ghcr.io/gnovi-ai/gnovi-${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
