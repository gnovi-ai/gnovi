version: 2
updates:
  # Python dependencies (uv workspace)
  - package-ecosystem: "uv"
    directories:
      - "/"
      - "/apps/api"
      - "/apps/worker"
      - "/libs/core"
      - "/libs/db"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      major:
        patterns: ["*"]
        update-types: ["major"]

  # Node.js dependencies (pnpm workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      major:
        patterns: ["*"]
        update-types: ["major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
    groups:
      actions:
        patterns: ["*"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
