# Project identification
sonar.projectKey=gnovi-ai_gnovi
sonar.organization=gnovi-ai

# Source configuration
sonar.sources=apps/,libs/,packages/
sonar.tests=apps/api/tests,apps/worker/tests,libs/core/tests,libs/db/tests
sonar.test.inclusions=**/tests/**,**/*.test.*,**/*.spec.*

# Exclusions
sonar.exclusions=\
  experiments/**,\
  docs/**,\
  infra/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/.next/**,\
  **/dist/**,\
  **/*.lock,\
  **/pnpm-lock.yaml,\
  **/uv.lock

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

# Language settings
sonar.python.version=3.13
sonar.sourceEncoding=UTF-8
